name: Android Release APK

# Builds a signed APK and attaches it to a GitHub Release whenever you push a
# version tag (e.g. v1.0.0). That single artifact feeds both Obtainium (users add
# this repo's URL) and IzzyOnDroid (its bot pulls the release asset). See
# docs/ANDROID.md for the one-time keystore + secrets setup.

on:
  push:
    tags:
      - 'v*'        # v1.2.3
      - '[0-9]*'    # 1.2.3 (digit-led tags too)
  release:
    types: [published]   # creating a Release in the UI triggers a build
  workflow_dispatch:

permissions:
  contents: write   # create the Release and upload the APK

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build release APK (unsigned)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Sign APK
        id: sign
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_BASE64:-}" ]; then
            echo "::error::Signing secrets missing (KEYSTORE_BASE64/KEYSTORE_PASSWORD/KEY_ALIAS/KEY_PASSWORD). See docs/ANDROID.md."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          BT="$(ls -d "$ANDROID_SDK_ROOT"/build-tools/* | sort -V | tail -1)"
          UNSIGNED="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          OUT="cribbage-${GITHUB_REF_NAME}.apk"
          "$BT/zipalign" -p -f 4 "$UNSIGNED" "$RUNNER_TEMP/aligned.apk"
          "$BT/apksigner" sign \
            --ks "$RUNNER_TEMP/release.jks" \
            --ks-pass env:KEYSTORE_PASSWORD \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass env:KEY_PASSWORD \
            --out "$OUT" "$RUNNER_TEMP/aligned.apk"
          "$BT/apksigner" verify --print-certs "$OUT"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"

      - name: Publish APK to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sign.outputs.apk }}
          fail_on_unmatched_files: true
