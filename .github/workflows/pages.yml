name: Deploy to GitHub Pages

# Publishes the static web app to GitHub Pages. Unlike "Deploy from a branch"
# (which serves the whole repo root, source/Gradle dirs and all), this uploads
# only the built site: the root HTML pages, the vendored React, and the i18n
# runtime + locale catalogues (i18n.js + locales/, needed since translations
# load via <script>). The committed root HTML is the source of truth (same as the
# Android asset sync), so there is no build step here.
#
# One Pages site serves BOTH channels: `main` (the release snapshot) at the root,
# and `dev` (the latest work) under /dev/ — so there's a Pages preview of dev that
# doesn't depend on the Cloudflare pipeline. A push to either branch rebuilds the
# whole site (both branches are checked out every run) so neither channel is ever
# wiped by an update to the other.

on:
  push:
    branches: [main, dev]
    paths:
      - "index.html"
      - "trainer.html"
      - "play.html"
      - "favicon.svg"
      - "manifest.webmanifest"
      - "vendor/**"
      - "i18n.js"
      - "locales/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Allow one concurrent deploy; let an in-progress run finish so a half-published
# site is never left live.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out main (release snapshot)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - name: Check out dev (latest work)
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev-src

      - name: Assemble site (main at root, dev under /dev/)
        run: |
          pack() {  # pack <src-dir> <out-dir>
            local src="$1" out="$2"
            mkdir -p "$out/vendor"
            cp "$src/index.html" "$src/trainer.html" "$src/play.html" "$out/"
            cp "$src/vendor/react.production.min.js" "$src/vendor/react-dom.production.min.js" "$out/vendor/"
            cp "$src/i18n.js" "$out/"            # i18n runtime
            cp -r "$src/locales" "$out/locales"  # language list + per-language catalogues
            # favicon + manifest (tolerant: an older `main` snapshot may predate them)
            cp "$src/favicon.svg" "$src/manifest.webmanifest" "$out/" 2>/dev/null || true
          }
          pack main-src _site
          pack dev-src  _site/dev
          touch _site/.nojekyll   # skip Jekyll; serve files verbatim

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
