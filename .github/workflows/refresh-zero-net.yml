name: Refresh Cribbage Zero net

# Pulls the latest trained net from the cribbage-zero `net` branch, re-bundles it into the game
# (src/az_net.json -> rebuilt play.html), and commits if it changed. Run this before a release so the
# shipped "Zero" bot uses the current net. Manual (and optional weekly) — the net is otherwise frozen
# at whatever was last committed.

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 6 * * 1"   # uncomment for a weekly auto-refresh

permissions:
  contents: write

concurrency:
  group: refresh-zero-net
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install TypeScript (build.sh needs tsc)
        run: npm i -g typescript

      - name: Refresh the bundled net (pull + round + strip to engine-only)
        run: ./refresh-zero-net.sh   # single source of the pull/round/clean logic

      - name: Rebuild the pages
        run: ./build.sh

      - name: Commit if the net changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/az_net.json az_net.js index.html trainer.html play.html
          if git diff --cached --quiet; then
            echo "Zero net unchanged — nothing to commit."
          else
            ITER=$(node -e 'console.log(require("/tmp/cz_meta.json").iter)')   # iter/games come from progress.csv (parsed by refresh-zero-net.sh)
            GAMES=$(node -e 'console.log(require("/tmp/cz_meta.json").games||0)')
            git commit -m "Refresh Cribbage Zero net (iter ${ITER}, ${GAMES} games)"
            git push
          fi
