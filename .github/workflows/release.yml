name: Release trainer

# One-button release (workflow_dispatch). Does the whole documented release in a single run so it does
# NOT depend on a tag-push triggering android-release.yml (a tag pushed by GITHUB_TOKEN would NOT fire
# another workflow). Steps mirror docs/CLAUDE.md's release recipe:
#   refresh Zero net -> finalize VERSION (drop -dev) -> bump android versionCode(+1)/versionName
#   -> write fastlane changelog -> ./build.sh -> commit -> push dev + main -> tag v<version>
#   -> build + sign + publish the signed APK to a GitHub Release
#   -> bump dev's VERSION to the next <patch>-dev.1
# Needs the KEYSTORE_* repo secrets (same as android-release.yml). Manual tag pushes still go through
# android-release.yml unchanged.

on:
  workflow_dispatch:
    inputs:
      changelog:
        description: "Release changelog (fastlane / what's-new text)"
        required: true
        type: string
      refresh_net:
        description: "Refresh the bundled Zero net from cribbage-zero first"
        required: false
        default: true
        type: boolean

permissions:
  contents: write   # push dev/main/tag and publish the Release

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need full history to fast-forward main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install TypeScript (build.sh needs tsc)
        run: npm i -g typescript

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Compute release + next-dev versions
        id: ver
        run: |
          set -euo pipefail
          RAW="$(tr -d '[:space:]' < VERSION)"
          RELEASE="${RAW%%-dev*}"                                   # 1.1.24-dev.12 -> 1.1.24
          CUR_CODE="$(grep -oP 'versionCode\s+\K[0-9]+' android/app/build.gradle)"
          NEW_CODE="$((CUR_CODE + 1))"
          PATCH="${RELEASE##*.}"; BASE="${RELEASE%.*}"
          NEXT_DEV="${BASE}.$((PATCH + 1))-dev.1"                   # 1.1.24 -> 1.1.25-dev.1
          echo "release=${RELEASE}"   >> "$GITHUB_OUTPUT"
          echo "tag=v${RELEASE}"      >> "$GITHUB_OUTPUT"
          echo "code=${NEW_CODE}"     >> "$GITHUB_OUTPUT"
          echo "next_dev=${NEXT_DEV}" >> "$GITHUB_OUTPUT"
          echo "Release v${RELEASE} (versionCode ${NEW_CODE}); next dev ${NEXT_DEV}"

      - name: Refresh the bundled Zero net
        if: ${{ inputs.refresh_net }}
        run: ./refresh-zero-net.sh   # pulls latest net from cribbage-zero (public, no token)

      - name: Finalize version + changelog
        env:
          RELEASE: ${{ steps.ver.outputs.release }}
          NEW_CODE: ${{ steps.ver.outputs.code }}
          CHANGELOG: ${{ inputs.changelog }}
        run: |
          set -euo pipefail
          CUR_CODE="$(grep -oP 'versionCode\s+\K[0-9]+' android/app/build.gradle)"
          printf '%s\n' "${RELEASE}" > VERSION
          sed -i "s/versionCode ${CUR_CODE}/versionCode ${NEW_CODE}/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${RELEASE}\"/" android/app/build.gradle
          mkdir -p fastlane/metadata/android/en-US/changelogs
          printf '%s\n' "${CHANGELOG}" > "fastlane/metadata/android/en-US/changelogs/${NEW_CODE}.txt"

      - name: Rebuild pages
        run: ./build.sh

      - name: Commit, tag, push dev + main
        env:
          RELEASE: ${{ steps.ver.outputs.release }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release v${RELEASE}"
          git tag "${TAG}"
          git push origin "HEAD:${GITHUB_REF_NAME}"   # update the dispatched branch (dev)
          git push origin "HEAD:main"                  # release snapshot
          git push origin "${TAG}"

      - name: Build release APK (unsigned)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Sign APK
        id: sign
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_BASE64:-}" ]; then
            echo "::error::Signing secrets missing (KEYSTORE_BASE64/KEYSTORE_PASSWORD/KEY_ALIAS/KEY_PASSWORD). See docs/ANDROID.md."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          BT="$(ls -d "$ANDROID_SDK_ROOT"/build-tools/* | sort -V | tail -1)"
          UNSIGNED="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          OUT="cribbage-${TAG}.apk"
          "$BT/zipalign" -p -f 4 "$UNSIGNED" "$RUNNER_TEMP/aligned.apk"
          "$BT/apksigner" sign \
            --ks "$RUNNER_TEMP/release.jks" \
            --ks-pass env:KEYSTORE_PASSWORD \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass env:KEY_PASSWORD \
            --out "$OUT" "$RUNNER_TEMP/aligned.apk"
          "$BT/apksigner" verify --print-certs "$OUT"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"

      - name: Publish the Release with the signed APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body: ${{ inputs.changelog }}
          files: ${{ steps.sign.outputs.apk }}
          fail_on_unmatched_files: true

      - name: Open dev on the next -dev version
        env:
          NEXT_DEV: ${{ steps.ver.outputs.next_dev }}
        run: |
          set -euo pipefail
          printf '%s\n' "${NEXT_DEV}" > VERSION
          ./build.sh
          git add -A
          git commit -m "Start ${NEXT_DEV}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
